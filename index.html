<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Магазин тримерів</title>
    <style>
        /* Виправлення помилки CSS зі скріншоту */
        .spec-modal { padding-bottom: 16px; padding-bottom: env(safe-area-inset-bottom, 16px); display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #fff; margin: 15% auto; padding: 20px; width: 80%; border-radius: 10px; position: relative; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; }
        
        /* Стилі кошика */
        .cart-icon { position: fixed; top: 20px; right: 20px; background: #ff4500; color: white; padding: 10px 15px; border-radius: 50px; cursor: pointer; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .cart-count { font-weight: bold; margin-left: 5px; }
        
        /* Форма замовлення */
        #order-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .order-form { background: #fff; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
        .order-form h2 { margin-top: 0; color: #333; }
        .order-form input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        
        /* Бургер-меню */
        .nav.active { display: block !important; }
    </style>
</head>
<body>

<div class="cart-icon" onclick="openOrderModal()">
    🛒 Кошик <span id="cart-counter" class="cart-count">0</span>
</div>

<div id="order-modal-overlay">
    <div class="order-form">
        <span class="close-modal" onclick="closeOrderModal()">&times;</span>
        <h2>Оформлення</h2>
        <div id="cart-items-list" style="margin-bottom: 15px; font-size: 14px; color: #666;"></div>
        <form id="tg-form">
            <input type="text" name="name" placeholder="Ваше ім'я" required>
            <input type="tel" name="phone" placeholder="Номер телефону" required>
            <input type="text" name="delivery" placeholder="Місто та № пошти">
            <button type="submit" class="submit-btn">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</button>
        </form>
    </div>
</div>

<script>
// Дані для Telegram (вже вписав ваші)
const BTN_TOKEN = '8750230516:AAG52DRZZdu3UzuvF8RXMMxKBE8pF4i8XsE';
const CHAT_ID = '8750230516';

let cart = [];

// 1. Додавання в кошик
document.querySelectorAll('.buy-btn, .order-btn, [data-buy]').forEach(button => {
    button.onclick = function(e) {
        e.preventDefault();
        // Намагаємось знайти назву товару поруч з кнопкою
        const container = this.closest('.product-card, .main-offer, section');
        const title = container ? (container.querySelector('h1, h2, h3')?.innerText || 'Тример') : 'Тример';
        const price = container ? (container.querySelector('.price-new, .current-price')?.innerText || 'Ціна уточнюється') : '';

        cart.push({ title, price });
        updateCartUI();
        alert('Додано в кошик: ' + title);
    };
});

function updateCartUI() {
    document.getElementById('cart-counter').innerText = cart.length;
}

// 2. Керування модальним вікном замовлення
function openOrderModal() {
    if(cart.length === 0) return alert("Кошик порожній!");
    const list = document.getElementById('cart-items-list');
    list.innerHTML = "<b>У кошику:</b><br>" + cart.map(i => `- ${i.title} (${i.price})`).join('<br>');
    document.getElementById('order-modal-overlay').style.display = 'flex';
}

function closeOrderModal() {
    document.getElementById('order-modal-overlay').style.display = 'none';
}

// 3. Відправка в Telegram
document.getElementById('tg-form').onsubmit = async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button');
    btn.innerText = "Відправка...";
    btn.disabled = true;

    const name = this.name.value;
    const phone = this.phone.value;
    const delivery = this.delivery.value;

    let message = `🚀 <b>НОВЕ ЗАМОВЛЕННЯ!</b>\n\n`;
    message += `👤 Клієнт: ${name}\n`;
    message += `📞 Тел: ${phone}\n`;
    message += `📍 Доставка: ${delivery}\n\n`;
    message += `📦 <b>Товари:</b>\n`;
    cart.forEach((item, index) => {
        message += `${index + 1}. ${item.title} — ${item.price}\n`;
    });

    try {
        const response = await fetch(`https://api.telegram.org/bot${BTN_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                parse_mode: 'html',
                text: message
            })
        });

        if(response.ok) {
            alert('Дякуємо! Замовлення прийнято. Ми зв\'яжемося з вами найближчим часом.');
            cart = [];
            updateCartUI();
            closeOrderModal();
            this.reset();
        } else {
            throw new Error();
        }
    } catch (err) {
        alert('Помилка відправки. Перевірте інтернет або зверніться до підтримки.');
    } finally {
        btn.innerText = "ПІДТВЕРДИТИ ЗАМОВЛЕННЯ";
        btn.disabled = false;
    }
};

// 4. Бургер меню (якщо є клас .menu-toggle)
document.querySelectorAll('.menu-toggle, .header__burger').forEach(b => {
    b.onclick = () => document.querySelector('.nav').classList.toggle('active');
});

// 5. Модальні вікна характеристик (виправлення ID)
document.querySelectorAll('[data-modal-target]').forEach(btn => {
    btn.onclick = () => {
        const id = btn.getAttribute('data-modal-target');
        const modal = document.getElementById(id);
        if(modal) modal.style.display = 'block';
    };
});
</script>
</body>
</html>
