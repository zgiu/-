<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vape Cloud UA — PRO Магазин</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#0d0d0d; --card:#161616; --card2:#1e1e1e; --border:#2a2a2a;
    --accent:#00e5ff; --accent2:#7b2fff; --white:#ffffff; --text:#cccccc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
header{position:fixed;top:0;left:0;right:0;background:rgba(13,13,13,0.95);border-bottom:1px solid var(--border);padding:15px 20px;z-index:300;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Barlow Condensed';font-size:1.8rem;font-weight:900;color:var(--white);text-decoration:none;} .logo span{color:var(--accent);}
section{text-align:center;padding:120px 20px;}
h1{font-size:3rem;font-family:'Barlow Condensed';margin-bottom:8px;} h1 span{color:var(--accent);}
p{color:var(--text);font-size:1.1rem;}
.products{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:20px;}
.product-card{background:var(--card2);padding:18px;border-radius:12px;width:250px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.product-card img{width:100%;border-radius:10px;}
.product-card h3{font-size:1.1rem;text-align:center;}
.product-card .price{font-weight:700;color:var(--accent);margin-bottom:8px;}
.buy-btn{padding:10px 18px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;}
.cart-float-btn{position:fixed;bottom:30px;right:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;padding:15px 22px;border-radius:50px;font-weight:900;cursor:pointer;z-index:1000;display:flex;align-items:center;gap:8px;}
.order-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;padding:15px;}
.order-modal{background:var(--card);border:1px solid var(--accent);padding:28px;border-radius:18px;width:90%;max-width:420px;position:relative;}
.order-modal h2{color:var(--accent);font-family:'Barlow Condensed';text-transform:uppercase;margin-bottom:18px;text-align:center;}
.order-modal input{width:100%;background:#000;border:1px solid var(--border);padding:12px;margin-bottom:10px;color:#fff;border-radius:8px;font-size:15px;}
.finish-btn{background:var(--accent);color:#000;width:100%;padding:14px;border:none;border-radius:8px;font-weight:900;cursor:pointer;margin-top:8px;font-size:1rem;}
.close-x{position:absolute;top:12px;right:16px;font-size:26px;cursor:pointer;color:var(--text);}
#cart-preview{max-height:120px;overflow-y:auto;color:var(--text);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;padding:12px 20px;border:1px solid var(--accent);border-radius:8px;color:#fff;font-weight:600;z-index:9999;}
</style>
<script src="https://static.liqpay.ua/libjs/checkout.js" async></script>
</head>
<body>

<header><a class="logo" href="#">VAPE<span>CLOUD</span></a></header>

<section>
<h1>VAPE CLOUD UA</h1>
<p>PRO Магазин з онлайн оплатою та Telegram повідомленням</p>
</section>

<div class="products">
<!-- ТОВАРИ -->
<div class="product-card" data-product data-name="POD‑Система SMOK NOVO 4" data-price="1299">
<img src="https://via.placeholder.com/250" alt="SMOK NOVO 4">
<h3>POD‑Система SMOK NOVO 4</h3><div class="price">1299 грн</div>
<button class="buy-btn">Додати</button>
</div>

<div class="product-card" data-product data-name="POD‑Система Vaporesso XROS 3" data-price="999">
<img src="https://via.placeholder.com/250" alt="Vaporesso XROS 3">
<h3>Vaporesso XROS 3</h3><div class="price">999 грн</div>
<button class="buy-btn">Додати</button>
</div>

<div class="product-card" data-product data-name="Рідина Cloud Monster 60мл" data-price="499">
<img src="https://via.placeholder.com/250" alt="Cloud Monster">
<h3>Рідина Cloud Monster 60мл</h3><div class="price">499 грн</div>
<button class="buy-btn">Додати</button>
</div>

<div class="product-card" data-product data-name="Картридж SMOK NOVO 4" data-price="199">
<img src="https://via.placeholder.com/250" alt="Картридж SMOK NOVO 4">
<h3>Картридж SMOK NOVO 4</h3><div class="price">199 грн</div>
<button class="buy-btn">Додати</button>
</div>
</div>

<button class="cart-float-btn" onclick="openOrder()">🛒 КОШИК: <span id="c-count">0</span></button>

<div class="order-overlay" id="ordOverlay">
<div class="order-modal">
<span class="close-x" onclick="closeOrder()">&times;</span>
<h2>Оформити замовлення</h2>
<div id="cart-preview"></div>
<form id="checkoutForm">
<input type="text" name="uname" placeholder="Ваше ім'я" required>
<input type="tel" name="uphone" placeholder="Номер телефону" required>
<input type="text" name="uaddr" placeholder="Місто і № відділення" required>
<button type="submit" class="finish-btn">Оплатити</button>
</form>
</div>
</div>

<script>
let cartItems = [];

document.addEventListener('click', e=>{
    const btn=e.target.closest('.buy-btn');
    if(!btn) return;
    const card=btn.closest('[data-product]');
    if(!card) return;
    cartItems.push({name:card.dataset.name, price:card.dataset.price});
    document.getElementById('c-count').innerText=cartItems.length;
    showToast(`Додано: ${card.dataset.name}`);
});

function showToast(txt){
    const t=document.createElement('div');t.className='toast';t.innerText=txt;
    document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}

function openOrder(){
    if(cartItems.length===0) return showToast("Кошик пустий!");
    const preview=document.getElementById('cart-preview');
    preview.innerHTML=cartItems.map((i,idx)=>`<div style="display:flex;justify-content:space-between;margin:6px 0;">
        <span>${i.name}</span><span>${i.price} грн</span>
        <button onclick="removeItem(${idx})" style="background:none;border:none;color:red;cursor:pointer;">✖</button>
        </div>`).join('');
    document.getElementById('ordOverlay').style.display='flex';
}

function removeItem(idx){
    cartItems.splice(idx,1);
    document.getElementById('c-count').innerText=cartItems.length;
    openOrder();
}

function closeOrder(){document.getElementById('ordOverlay').style.display='none';}

document.getElementById('checkoutForm').onsubmit=function(e){
    e.preventDefault();
    const uname=this.uname.value, uphone=this.uphone.value, uaddr=this.uaddr.value;
    const amount=cartItems.reduce((a,c)=>a+parseInt(c.price),0);

    const orderText=`📦 НОВЕ ЗАМОВЛЕННЯ\n👤 Клієнт: ${uname}\n📞 Тел: ${uphone}\n📍 Адреса: ${uaddr}\nТовари:\n`+
        cartItems.map((i,idx)=>`${idx+1}. ${i.name} — ${i.price} грн`).join('\n');

    // LIQPAY - ЗАГЛУШКИ КЛЮЧІВ
    const liqpayData = {
        public_key: "PUBLIC_KEY_HERE",
        private_key: "PRIVATE_KEY_HERE",
        action: "pay",
        amount: amount,
        currency: "UAH",
        description: `Оплата замовлення для ${uname}`,
        order_id: `order_${Date.now()}`,
        version: 3
    };
    
    // ОТРИМАННЯ СИГНАТУРИ (для реальної роботи потрібно на сервері)
    liqpayData.signature = "SIGNATURE_PLACEHOLDER";

    LiqPayCheckout.init({
        data: btoa(JSON.stringify(liqpayData)),
        signature: liqpayData.signature,
        embedTo: "#checkoutForm",
        mode: "popup"
    }).on("liqpay.callback", function(data){
        if(data.status=="success"){
            // Telegram повідомлення після успішної оплати
            const telegramUrl = `https://t.me/vapeclouduah?text=${encodeURIComponent(orderText)}`;
            window.open(telegramUrl,"_blank");
            showToast("Оплата пройшла! Telegram повідомлення відправлено.");
            cartItems=[]; document.getElementById('c-count').innerText='0'; closeOrder(); document.getElementById('checkoutForm').reset();
        }
    }).on("liqpay.ready", function(){})
      .on("liqpay.close", function(){});
};
</script>

</body>
</html>
